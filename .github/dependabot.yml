version: 2

updates:
  # ---------------------------------------------------------------------------
  # npm (package root)
  # ---------------------------------------------------------------------------
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    reviewers:
      - maintainers
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: "chore(deps)"
    # Version updates group by runtime impact (a peer/runtime bump deserves more
    # scrutiny than a dev-tool bump). Security updates stay UNGROUPED — each
    # advisory lands as its own immediately-mergeable PR instead of riding along
    # in a weekly batch.
    groups:
      runtime-dependencies:
        applies-to: version-updates
        dependency-type: production
        patterns:
          - "*"
      dev-dependencies:
        applies-to: version-updates
        dependency-type: development
        patterns:
          - "*"
    ignore:
      # These scoped ignores suppress version-update PRs only. If a security fix
      # ever ships exclusively in a new major, the Dependabot ALERT still fires —
      # handle that major manually.
      # Major React/MUI bumps require manual migration work.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@mui/material"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@mui/icons-material"
        update-types: ["version-update:semver-major"]
      # Major TypeScript bumps break the toolchain before app code: tsup's
      # bundled rollup-plugin-dts crashes against TS7's changed internals
      # (2026-07-13 incident). Revisit once tsup ships a TS7-compatible release.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # GitHub Actions
  # ---------------------------------------------------------------------------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    reviewers:
      - maintainers
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions-dependencies:
        patterns:
          - "*"
