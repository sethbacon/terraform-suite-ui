---
name: Release Please

"on":
  push:
    branches: [main]
  workflow_dispatch: {}

# The release/PR mutations run under the GitHub App token minted below, not the
# workflow's GITHUB_TOKEN — so this workflow itself needs no write permissions.
permissions:
  contents: read

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - name: Get GitHub App token
        # v3.1.1
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        id: token
        with:
          client-id: ${{ vars.RELEASE_DISPATCH_APP_ID }}
          private-key: ${{ secrets.RELEASE_DISPATCH_APP_KEY }}

      - name: Run release-please
        # v5.0.0
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        with:
          token: ${{ steps.token.outputs.token }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
