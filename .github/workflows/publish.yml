name: Publish package

# Publishes @sethbacon/terraform-suite-ui to GitHub Packages when a GitHub
# Release is published (tag the release vX.Y.Z to match package.json version).
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: "@sethbacon"

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
