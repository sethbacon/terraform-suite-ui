name: Publish package

# Publishes @sethbacon/terraform-suite-ui to GitHub Packages when a GitHub
# Release is published (tag the release vX.Y.Z to match package.json version).
#
# workflow_dispatch is kept only for re-running a publish against an EXISTING,
# already-tagged release (e.g. a transient registry failure) — the
# "Verify tag matches package.json version" step below refuses to publish
# unless the checked-out ref is exactly the git tag `v<package.json version>`,
# so a manual run against an arbitrary branch/commit can no longer bypass the
# tagged-release flow.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # Requires a required-reviewer / deployment-branch protection rule on the
    # "release" environment (Settings > Environments) for that gate to take
    # effect; the environment reference alone scopes secrets to this job.
    environment: release
    permissions:
      contents: read
      packages: write
      id-token: write # for actions/attest-build-provenance
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: "@sethbacon"

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "${GITHUB_REF}" != "refs/tags/${PKG_VERSION}" ]; then
            echo "::error::GITHUB_REF (${GITHUB_REF}) does not match package.json version (${PKG_VERSION}). Refusing to publish an unreviewed/untagged ref."
            exit 1
          fi
          echo "Publishing ${PKG_VERSION} from ${GITHUB_REF} — OK"

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      # Re-run the advisory audit at publish time (mirrors ci.yml) so a workflow_dispatch
      # re-publish of an older tag can't ship without a fresh high-severity advisory check.
      - run: npm audit --audit-level=high

      - name: Verify the publish tarball only contains dist + docs
        run: |
          npm pack --dry-run --json > /tmp/pack.json
          UNEXPECTED=$(node -e "
            const pkg = require('/tmp/pack.json')[0];
            const bad = pkg.files
              .map(f => f.path)
              .filter(p => !p.startsWith('dist/') && !['package.json', 'README.md', 'LICENSE', 'NOTICE'].includes(p));
            console.log(bad.join('\n'));
          ")
          if [ -n "$UNEXPECTED" ]; then
            echo "::error::Unexpected file(s) would be published: $UNEXPECTED"
            exit 1
          fi

      # Pack the exact tarball we publish so the provenance attestation below binds to the
      # published bytes (the tarball digest), not just the on-disk dist/ tree.
      - name: Pack tarball
        id: pack
        run: echo "tarball=$(npm pack --silent)" >> "$GITHUB_OUTPUT"

      - run: npm publish "${{ steps.pack.outputs.tarball }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}

      # Machine-readable BOM (CycloneDX) of the full dependency graph, attested and bound to the
      # published tarball so consumers can triage CVEs against an exact, verifiable component list.
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Attest SBOM for the published tarball
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}
          sbom-path: sbom.cyclonedx.json
