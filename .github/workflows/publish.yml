name: Publish package

# Publishes @sethbacon/terraform-suite-ui to GitHub Packages when a GitHub
# Release is published (tag the release vX.Y.Z to match package.json version).
#
# workflow_dispatch is kept only for re-running a publish against an EXISTING,
# already-tagged release (e.g. a transient registry failure) — the
# "Verify tag matches package.json version" step below refuses to publish
# unless the checked-out ref is exactly the git tag `v<package.json version>`,
# so a manual run against an arbitrary branch/commit can no longer bypass the
# tagged-release flow.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

# Serialise publishes so two release/dispatch runs can't race the same version to the registry.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Unprivileged build/test: runs npm ci and the full dependency lifecycle in a job that holds NO
  # publish/attestation permissions, so a poisoned transitive dependency cannot reach the registry
  # token, mint an OIDC token, or forge attestations. Produces the exact tarball + SBOM as artifacts.
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tarball: ${{ steps.pack.outputs.tarball }}
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: "@sethbacon"

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "${GITHUB_REF}" != "refs/tags/${PKG_VERSION}" ]; then
            echo "::error::GITHUB_REF (${GITHUB_REF}) does not match package.json version (${PKG_VERSION}). Refusing to publish an unreviewed/untagged ref."
            exit 1
          fi
          echo "Publishing ${PKG_VERSION} from ${GITHUB_REF} — OK"

      # --ignore-scripts: this package's build (tsup/esbuild) and tests need no dependency install
      # scripts, so disabling them shrinks the untrusted-code surface even in this unprivileged job.
      - run: npm ci --ignore-scripts

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      # Re-run the advisory audit at publish time (mirrors ci.yml) so a workflow_dispatch
      # re-publish of an older tag can't ship without a fresh advisory/signature check.
      - run: npm audit --audit-level=moderate
      - run: npm audit signatures

      - name: Verify the publish tarball only contains dist + docs
        run: |
          npm pack --dry-run --json > /tmp/pack.json
          UNEXPECTED=$(node -e "
            const pkg = require('/tmp/pack.json')[0];
            const bad = pkg.files
              .map(f => f.path)
              .filter(p => !p.startsWith('dist/') && !['package.json', 'README.md', 'LICENSE', 'NOTICE'].includes(p));
            console.log(bad.join('\n'));
          ")
          if [ -n "$UNEXPECTED" ]; then
            echo "::error::Unexpected file(s) would be published: $UNEXPECTED"
            exit 1
          fi

      # Pack the exact tarball once so the published bytes and the attestations below all bind to
      # the same digest.
      - name: Pack tarball
        id: pack
        run: echo "tarball=$(npm pack --silent)" >> "$GITHUB_OUTPUT"

      # Content check, not just paths: the bytes inside the tarball must be exactly the dist/ this
      # job built two steps ago — a pack-time mutation (e.g. a lifecycle script slipped into a
      # dependency) cannot swap file contents undetected.
      - name: Verify tarball contents match the built dist byte-for-byte
        run: |
          mkdir -p /tmp/tarball-verify
          tar -xzf "${{ steps.pack.outputs.tarball }}" -C /tmp/tarball-verify
          diff -r /tmp/tarball-verify/package/dist dist

      # CycloneDX BOM of the full dependency graph. Generated here (unprivileged) and attested in
      # the publish job. Release-asset upload is disabled so this job needs no contents: write.
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload publish artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: publish-artifacts
          path: |
            ${{ steps.pack.outputs.tarball }}
            sbom.cyclonedx.json
          if-no-files-found: error
          retention-days: 1

  # Minimal privileged job: downloads only the vetted artifacts and publishes + attests them. It
  # holds the registry/OIDC/attestation permissions but runs no dependency code (no npm ci/build).
  publish:
    needs: build
    runs-on: ubuntu-latest
    # A deployment-branch/tag policy on the "release" environment (Settings > Environments)
    # restricts this job to v* tags; the environment reference also scopes secrets to this job.
    environment: release
    permissions:
      contents: read
      packages: write
      id-token: write # for actions/attest-*
      attestations: write
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: "@sethbacon"

      - name: Download publish artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: publish-artifacts

      - run: npm publish "${{ needs.build.outputs.tarball }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ needs.build.outputs.tarball }}

      - name: Attest SBOM for the published tarball
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: ${{ needs.build.outputs.tarball }}
          sbom-path: sbom.cyclonedx.json
